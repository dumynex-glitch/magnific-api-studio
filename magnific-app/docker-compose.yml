services:
  magnific-api-studio:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: magnific-api-studio
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - RATE_LIMIT_MAX=60
      - RATE_LIMIT_WINDOW=60
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
