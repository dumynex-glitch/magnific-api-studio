<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magnific API Studio</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="logo">
                <h1>Magnific API Studio</h1>
                <span class="badge">v1.0</span>
            </div>
            <nav class="header-nav">
                <a href="/docs" target="_blank">API Docs</a>
                <button id="settings-btn" class="settings-btn" title="Settings">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                </button>
            </nav>
        </header>

        <main class="app-main">
            <div class="sidebar">
                <div class="category-selector">
                    <label for="category-select">Category</label>
                    <select id="category-select">
                        <option value="">Select a category...</option>
                    </select>
                </div>

                <div class="model-selector">
                    <label for="model-select">Model</label>
                    <select id="model-select" disabled>
                        <option value="">Select a model...</option>
                    </select>
                </div>

                <div class="model-description" id="model-description"></div>

                <div class="task-history">
                    <h3>Recent Tasks</h3>
                    <ul id="task-list"></ul>
                </div>
            </div>

            <div class="content-area">
                <div class="form-container" id="form-container">
                    <div class="placeholder">
                        <p>Select a category and model to start generating</p>
                    </div>
                </div>

                <div class="result-container" id="result-container" style="display:none;">
                    <div class="result-header">
                        <h3>Result</h3>
                        <span class="status-badge" id="status-badge">PENDING</span>
                    </div>
                    <div class="progress-section" id="progress-section" style="display:none;">
                        <div class="progress-spinner">
                            <div class="spinner"></div>
                        </div>
                        <div class="progress-details">
                            <div class="progress-status" id="progress-status">Initializing...</div>
                            <div class="progress-time">
                                <span>Elapsed: <span id="elapsed-time">0s</span></span>
                                <span class="progress-eta" id="progress-eta"></span>
                            </div>
                        </div>
                    </div>
                    <div class="result-content" id="result-content"></div>
                    <div class="result-actions">
                        <button id="poll-btn" class="btn btn-primary" style="display:none;">Poll Status</button>
                        <button id="new-task-btn" class="btn btn-secondary">New Task</button>
                    </div>
                </div>

                <div class="log-panel" id="log-panel">
                    <div class="log-panel-header">
                        <button id="log-toggle-btn" class="log-toggle-btn" title="Show/Hide Log Panel">
                            <svg class="log-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18"/><path d="M6 6l12 12"/></svg>
                            <span>Live Log</span>
                            <span class="log-count" id="log-count">0</span>
                        </button>
                        <button id="log-clear-btn" class="log-clear-btn" title="Clear logs">Clear</button>
                    </div>
                    <div class="log-panel-body" id="log-panel-body">
                        <div class="log-entries" id="log-entries"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="toast-container" id="toast-container"></div>

    <div class="settings-overlay" id="settings-overlay"></div>
    <div class="settings-panel" id="settings-panel">
        <div class="settings-header">
            <h3>API Keys</h3>
            <button id="settings-close-btn" class="settings-close-btn">&times;</button>
        </div>
        <div class="settings-body">
            <p class="settings-hint">Store up to 5 API keys. Toggle keys on/off to switch which key is active. Only one key can be active at a time.</p>
            <div id="api-keys-container"></div>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
